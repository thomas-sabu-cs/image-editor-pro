# Image Editor Pro - CI: tests + lint on every push to main
name: Python app

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Qt/EGL system dependencies (Linux)
      run: |
        sudo apt-get update
        sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libxcb-xinerama0 libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xfixes0 libxcb-shape0 libdbus-1-3

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: |
        export PYTHONPATH="$GITHUB_WORKSPACE"
        pytest tests/ -v --tb=short

    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 src/ main.py build_exe.py --count --statistics
